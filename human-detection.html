<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>人物检测 - 故障特效</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            background: #000;
            overflow: hidden;
            width: 100vw;
            height: 100vh;
        }
        #bgVideo {
            position: fixed;
            top: 50%; left: 50%;
            transform: translate(-50%, -50%);
            min-width: 100%; min-height: 100%;
            object-fit: cover;
        }
        #canvas {
            position: fixed;
            top: 0; left: 0;
            width: 100vw; height: 100vh;
            z-index: 10;
            pointer-events: none;
        }
        #webcam { display: none; }
        #loading {
            position: fixed;
            top: 0; left: 0;
            width: 100vw; height: 100vh;
            z-index: 100;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            background: #0a0a0a;
            color: #fff;
            font-size: 18px;
            transition: opacity 0.8s ease;
        }
        #loading.hidden { opacity: 0; pointer-events: none; }
        #loading .spinner {
            width: 48px; height: 48px;
            border: 3px solid rgba(255,255,255,0.1);
            border-top-color: #fff;
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
            margin-bottom: 20px;
        }
        @keyframes spin { to { transform: rotate(360deg); } }
        #loading p { opacity: 0.7; font-weight: 300; }
        #loading .sub { font-size: 13px; opacity: 0.4; margin-top: 8px; }
    </style>
</head>
<body>

    <div id="loading">
        <div class="spinner"></div>
        <p>正在加载模型...</p>
        <div class="sub">首次加载可能需要一些时间</div>
    </div>

    <video id="bgVideo" autoplay loop playsinline>
        <source src="video.mp4" type="video/mp4">
    </video>

    <canvas id="canvas"></canvas>

    <video id="webcam" autoplay playsinline></video>

    <script>
        // ============================================================
        // DOM 引用
        // ============================================================
        const bgVideo = document.getElementById('bgVideo');
        const canvas = document.getElementById('canvas');
        const ctx = canvas.getContext('2d');
        const webcam = document.getElementById('webcam');
        const loading = document.getElementById('loading');

        // ============================================================
        // 配置
        // ============================================================
        let isHumanDetected = false;
        let animationId = null;
        let human = null;
        let videoReady = false;
        let cameraReady = false;
        let frameCount = 0;
        let glitchTimer = 0;
        const GLITCH_INTERVAL = 5;

        // ============================================================
        // Canvas 自适应
        // ============================================================
        function resizeCanvas() {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
        }
        window.addEventListener('resize', resizeCanvas);
        resizeCanvas();

        // ============================================================
        // 加载视频
        // ============================================================
        function loadVideo() {
            return new Promise((resolve) => {
                if (bgVideo.readyState >= 2) { resolve(); return; }
                bgVideo.addEventListener('canplay', resolve, { once: true });
                setTimeout(resolve, 5000);
            });
        }

        async function playVideo() {
            for (let i = 0; i < 3; i++) {
                try {
                    await bgVideo.play();
                    return true;
                } catch (e) {
                    await new Promise(r => setTimeout(r, 200));
                }
            }
            return false;
        }

        // ============================================================
        // 初始化 Human（动态导入）
        // ============================================================
        async function initHuman() {
            const module = await import('https://cdn.jsdelivr.net/npm/@vladmandic/human@latest/dist/human.esm.js');
            const Human = module.default || module.Human;

            const h = new Human({
                backend: 'webgl',
                async: true,
                warmup: 'none',
                modelBasePath: 'https://cdn.jsdelivr.net/npm/@vladmandic/human@latest/models/',
                filter: { enabled: false },
                face: { enabled: true, detector: { enabled: true, maxDetected: 5, minScore: 0.3 }, mesh: false, iris: false, description: false, emotion: false },
                body: { enabled: true, maxDetected: 5, minScore: 0.1 },
                hand: { enabled: false },
                object: { enabled: false },
                gesture: { enabled: false },
            });

            await h.load();

            const wc = document.createElement('canvas');
            wc.width = 64; wc.height = 48;
            const wctx = wc.getContext('2d');
            wctx.fillStyle = '#808080';
            wctx.fillRect(0, 0, 64, 48);
            await h.detect(wc);

            return h;
        }

        // ============================================================
        // 初始化摄像头
        // ============================================================
        async function initCamera() {
            try {
                const stream = await navigator.mediaDevices.getUserMedia({
                    video: { width: { ideal: 640 }, height: { ideal: 480 }, facingMode: 'user' },
                    audio: false,
                });
                webcam.srcObject = stream;
                await webcam.play();
                return true;
            } catch (err) {
                console.warn('摄像头不可用:', err.message);
                return false;
            }
        }

        // ============================================================
        // 检测：摄像头画面中是否有人
        // ============================================================
        async function detectHuman() {
            if (!human || webcam.readyState < 2) return false;
            try {
                const result = await human.detect(webcam);

                // 检查人脸（提高置信度阈值到 0.6）
                let hasFace = false;
                if (result.face && Array.isArray(result.face)) {
                    for (const f of result.face) {
                        if (f.score && f.score > 0.6) { hasFace = true; break; }
                    }
                }

                // 检查身体（提高置信度阈值到 0.5）
                let hasBody = false;
                if (result.body && Array.isArray(result.body)) {
                    for (const b of result.body) {
                        if (b.score && b.score > 0.5) { hasBody = true; break; }
                    }
                }

                return hasFace || hasBody;
            } catch (err) {
                // 检测出错，保守起见返回 false
                return false;
            }
        }

        // ============================================================
        // 故障扭曲特效
        // ============================================================
        function applyGlitchEffect() {
            const w = canvas.width;
            const h = canvas.height;

            ctx.clearRect(0, 0, w, h);
            ctx.drawImage(bgVideo, 0, 0, w, h);

            const areaX = Math.floor(Math.random() * (w * 0.5)) + w * 0.1;
            const areaY = Math.floor(Math.random() * (h * 0.5)) + h * 0.1;
            const areaW = 300 + Math.floor(Math.random() * 400);
            const areaH = 250 + Math.floor(Math.random() * 350);
            const offsetX = 15 + Math.floor(Math.random() * 30);

            ctx.globalCompositeOperation = 'screen';
            ctx.globalAlpha = 0.2;
            ctx.drawImage(bgVideo, areaX, areaY, areaW, areaH, areaX + offsetX, areaY, areaW, areaH);
            ctx.globalAlpha = 1.0;
            ctx.globalCompositeOperation = 'source-over';

            if (Math.random() < 0.5) {
                const bw = 320 + Math.floor(Math.random() * 640);
                const bh = 240 + Math.floor(Math.random() * 480);
                const bx = areaX + Math.floor(Math.random() * Math.max(1, areaW - bw));
                const by = areaY + Math.floor(Math.random() * Math.max(1, areaH - bh));
                const boX = 40 + Math.floor(Math.random() * 80);
                ctx.drawImage(bgVideo, bx, by, bw, bh, bx + boX, by, bw, bh);
                if (Math.random() < 0.3) { ctx.fillStyle = 'rgba(0,0,0,0.5)'; ctx.fillRect(bx, by, bw, bh); }
                if (Math.random() < 0.35) {
                    ctx.fillStyle = 'rgba(' + Math.floor(Math.random()*120) + ',' + Math.floor(Math.random()*80) + ',' + Math.floor(Math.random()*150) + ',0.25)';
                    ctx.fillRect(bx + boX, by, bw, bh);
                }
            }

            const tearCount = 1 + Math.floor(Math.random() * 2);
            for (let t = 0; t < tearCount; t++) {
                const tearY = areaY + Math.floor(Math.random() * areaH);
                const tearH = 6 + Math.floor(Math.random() * 16);
                const tearOffset = 20 + Math.floor(Math.random() * 40);
                ctx.drawImage(bgVideo, areaX, tearY, areaW, tearH, areaX + tearOffset, tearY, areaW, tearH);
                if (Math.random() < 0.3) { ctx.fillStyle = 'rgba(0,0,0,0.35)'; ctx.fillRect(areaX, tearY, areaW, tearH); }
            }

            const fr = Math.random();
            if (fr < 0.03) { ctx.fillStyle = 'rgba(255,255,255,0.25)'; ctx.fillRect(areaX, areaY, areaW, areaH); }
            else if (fr < 0.06) { ctx.fillStyle = 'rgba(0,0,0,0.35)'; ctx.fillRect(areaX, areaY, areaW, areaH); }
        }

        // ============================================================
        // 主渲染循环
        // ============================================================
        async function renderFrame() {
            frameCount++;

            if (frameCount % 3 === 0 && cameraReady) {
                isHumanDetected = await detectHuman();
            }

            if (isHumanDetected && videoReady) {
                glitchTimer++;
                if (glitchTimer >= GLITCH_INTERVAL) {
                    glitchTimer = 0;
                    applyGlitchEffect();
                }
            } else {
                glitchTimer = 0;
                ctx.clearRect(0, 0, canvas.width, canvas.height);
            }

            animationId = requestAnimationFrame(renderFrame);
        }

        // ============================================================
        // 启动
        // ============================================================
        async function init() {
            try {
                await loadVideo();
                const played = await playVideo();
                videoReady = played;

                human = await initHuman();
                cameraReady = await initCamera();

                loading.classList.add('hidden');

                if (!played) {
                    document.addEventListener('click', async () => {
                        try { await bgVideo.play(); videoReady = true; } catch(e) {}
                    }, { once: true });
                }

                renderFrame();
            } catch (err) {
                console.error('初始化失败:', err);
                loading.classList.add('hidden');
            }
        }

        if (document.readyState === 'complete') init();
        else window.addEventListener('load', init);

        window.addEventListener('beforeunload', () => {
            if (animationId) cancelAnimationFrame(animationId);
            if (webcam.srcObject) webcam.srcObject.getTracks().forEach(t => t.stop());
        });
    </script>

</body>
</html>
